<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="rk-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000"/>
      <stop offset="100%" style="stop-color:#CC0000"/>
    </linearGradient>
    <clipPath id="rk-clip">
      <rect width="400" height="200" rx="14"/>
    </clipPath>
  </defs>

  <rect width="400" height="200" rx="14" fill="url(#rk-bg)"/>
  <circle cx="320" cy="100" r="110" fill="rgba(255,255,255,0.06)" clip-path="url(#rk-clip)"/>
  <circle cx="360" cy="170" r="70" fill="rgba(255,255,255,0.04)" clip-path="url(#rk-clip)"/>
  <rect x="0" y="0" width="6" height="200" rx="3" fill="#FF6B00"/>

  <!-- Logo -->
  <circle cx="46" cy="46" r="22" fill="rgba(255,255,255,0.15)"/>
  <text x="46" y="53" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="80" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">樂天銀行</text>
  <text x="80" y="56" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Rakuten Bank Taiwan</text>

  <line x1="20" y1="74" x2="260" y2="74" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- 主視覺：用戶可得金額 -->
  <text x="20" y="102" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.75)">開戶現金回饋</text>
  <text x="20" y="140" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" fill="white">NT$300</text>

  <!-- 步驟引導 -->
  <rect x="20" y="150" width="240" height="32" rx="8" fill="rgba(0,0,0,0.2)"/>
  <text x="32" y="163" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">STEP 1  輸入推薦碼</text>
  <text x="32" y="176" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">STEP 2  完成開戶 + 身分驗證 → 自動入帳</text>

  <!-- 推薦碼 Badge -->
  <rect x="270" y="148" width="112" height="36" rx="8" fill="rgba(255,107,0,0.8)"/>
  <text x="326" y="161" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">推薦碼</text>
  <text x="326" y="178" font-family="'Courier New', monospace" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">M2PVML</text>

  <text x="310" y="128" font-family="Arial Black, sans-serif" font-size="70" font-weight="900" fill="rgba(255,255,255,0.05)" text-anchor="middle">楽</text>
  <text x="380" y="194" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="end">活動至 2026/3/31</text>
</svg>
