<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="mm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8005A"/>
      <stop offset="100%" style="stop-color:#FF3380"/>
    </linearGradient>
    <clipPath id="mm-clip">
      <rect width="800" height="200" rx="14"/>
    </clipPath>
  </defs>

  <rect width="800" height="200" rx="14" fill="url(#mm-bg)"/>
  <circle cx="650" cy="100" r="160" fill="rgba(255,255,255,0.05)" clip-path="url(#mm-clip)"/>
  <circle cx="740" cy="180" r="100" fill="rgba(255,255,255,0.04)" clip-path="url(#mm-clip)"/>
  <rect x="0" y="0" width="6" height="200" rx="3" fill="#FFB800"/>

  <!-- Logo -->
  <circle cx="56" cy="54" r="28" fill="rgba(255,255,255,0.15)"/>
  <text x="56" y="63" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">m</text>
  <text x="100" y="44" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white">momo購物</text>
  <text x="100" y="64" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.65)">momoshop.com.tw</text>

  <line x1="28" y1="84" x2="520" y2="84" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- 主視覺 -->
  <text x="28" y="112" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">聯盟行銷計畫</text>
  <text x="28" y="152" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white">傭金 2~6%</text>

  <!-- 說明區塊 -->
  <rect x="28" y="162" width="420" height="28" rx="8" fill="rgba(0,0,0,0.2)"/>
  <text x="40" y="172" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.75)">台灣最大電商平台 · 推廣熱銷商品 · 輕鬆賺取佣金</text>
  <text x="40" y="184" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">每次成功購買自動計算 · 月結入帳</text>

  <!-- 標籤 Badge -->
  <rect x="568" y="148" width="200" height="40" rx="10" fill="rgba(255,184,0,0.85)"/>
  <text x="668" y="164" font-family="Arial, sans-serif" font-size="10" fill="rgba(0,0,0,0.8)" text-anchor="middle" font-weight="600">聯盟推薦</text>
  <text x="668" y="182" font-family="Arial Black, sans-serif" font-size="17" font-weight="900" fill="#333" text-anchor="middle">momo購物 | 聯盟推薦</text>

  <!-- 背景裝飾文字 -->
  <text x="640" y="140" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="rgba(255,255,255,0.04)" text-anchor="middle">momo</text>
  <text x="772" y="194" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.35)" text-anchor="end">affiliate.momoshop.com.tw</text>
</svg>
