<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="rc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00425A"/>
      <stop offset="100%" style="stop-color:#0093B2"/>
    </linearGradient>
    <linearGradient id="rc-badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C2CB"/>
      <stop offset="100%" style="stop-color:#00E0D0"/>
    </linearGradient>
    <clipPath id="rc-clip">
      <rect width="400" height="200" rx="14"/>
    </clipPath>
  </defs>

  <rect width="400" height="200" rx="14" fill="url(#rc-bg)"/>
  <circle cx="310" cy="80" r="130" fill="rgba(255,255,255,0.04)" clip-path="url(#rc-clip)"/>
  <rect x="0" y="0" width="6" height="200" rx="3" fill="#00E0D0"/>

  <!-- Logo -->
  <polygon points="42,22 62,42 42,62 22,42" fill="rgba(0,224,208,0.2)"/>
  <text x="42" y="47" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#00E0D0" text-anchor="middle">R</text>
  <text x="76" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="1">Richart</text>
  <text x="76" y="57" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">台新銀行數位帳戶</text>

  <line x1="20" y1="75" x2="260" y2="75" stroke="rgba(0,224,208,0.3)" stroke-width="1"/>

  <!-- 金額 -->
  <text x="20" y="100" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">開戶現金回饋</text>
  <rect x="20" y="106" width="120" height="44" rx="10" fill="url(#rc-badge)"/>
  <text x="80" y="133" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#003040" text-anchor="middle">NT$100</text>

  <!-- 步驟引導 -->
  <rect x="152" y="106" width="232" height="44" rx="8" fill="rgba(0,0,0,0.2)"/>
  <text x="164" y="121" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">STEP 1  輸入推薦碼 ELB6T</text>
  <text x="164" y="136" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">STEP 2  完成 KYC 身分驗證</text>
  <text x="164" y="146" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">（拍攝身分證 + 臉部辨識，約 5 分鐘）</text>

  <!-- 推薦碼 -->
  <rect x="20" y="158" width="112" height="28" rx="6" fill="rgba(0,224,208,0.2)"/>
  <text x="76" y="168" font-family="Arial, sans-serif" font-size="9" fill="#00E0D0" text-anchor="middle">推薦碼</text>
  <text x="76" y="181" font-family="'Courier New', monospace" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">ELB6T</text>

  <rect x="143" y="162" width="115" height="20" rx="6" fill="rgba(0,224,208,0.15)"/>
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="9" fill="#00E0D0" text-anchor="middle">回饋完成開戶後自動入帳</text>

  <text x="380" y="194" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="end">活動至 2026/3/31</text>
  <text x="340" y="150" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" fill="rgba(255,255,255,0.03)" text-anchor="middle">R</text>
</svg>
