<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="lb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#027A35"/>
      <stop offset="100%" style="stop-color:#06C755"/>
    </linearGradient>
    <clipPath id="lb-clip">
      <rect width="400" height="200" rx="14"/>
    </clipPath>
  </defs>

  <rect width="400" height="200" rx="14" fill="url(#lb-bg)"/>
  <circle cx="330" cy="90" r="120" fill="rgba(255,255,255,0.05)" clip-path="url(#lb-clip)"/>
  <rect x="0" y="0" width="6" height="200" rx="3" fill="rgba(255,255,255,0.6)"/>

  <!-- Logo -->
  <rect x="20" y="20" width="44" height="40" rx="12" fill="rgba(255,255,255,0.2)"/>
  <polygon points="30,60 38,60 34,68" fill="rgba(255,255,255,0.2)"/>
  <text x="42" y="46" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">L</text>
  <text x="76" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white">LINE Bank</text>
  <text x="76" y="55" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">台灣純網路銀行</text>

  <line x1="20" y1="78" x2="270" y2="78" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- 優惠說明 -->
  <text x="20" y="104" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" font-weight="600">新戶活存利率優惠</text>
  <text x="20" y="122" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">搭配 LINE Pay，日常消費回饋不中斷</text>

  <!-- 步驟引導 -->
  <rect x="20" y="132" width="260" height="44" rx="8" fill="rgba(0,0,0,0.15)"/>
  <text x="32" y="147" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">STEP 1  點擊下方「立即開戶」連結</text>
  <text x="32" y="162" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.75)">STEP 2  完成 LINE 身分驗證 + 開戶</text>
  <text x="32" y="172" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">（無需推薦碼，透過連結進入即享優惠）</text>

  <!-- CTA -->
  <rect x="290" y="132" width="95" height="44" rx="8" fill="rgba(255,255,255,0.9)"/>
  <text x="337" y="149" font-family="Arial, sans-serif" font-size="10" fill="#027A35" text-anchor="middle" font-weight="700">透過連結</text>
  <text x="337" y="163" font-family="Arial Black, sans-serif" font-size="12" fill="#027A35" text-anchor="middle" font-weight="900">立即開戶 →</text>
  <text x="337" y="174" font-family="Arial, sans-serif" font-size="9" fill="#049B40" text-anchor="middle">享新戶優惠</text>

  <text x="340" y="125" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="rgba(255,255,255,0.04)" text-anchor="middle">L</text>
</svg>
