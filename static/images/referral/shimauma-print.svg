<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <rect width="200" height="80" rx="10" fill="#1a1a2e"/>
  <!-- 斑馬紋裝飾 -->
  <rect x="0" y="0" width="200" height="80" rx="10" fill="url(#zstripes)" opacity="0.15"/>
  <defs>
    <pattern id="zstripes" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="20" fill="white"/>
    </pattern>
  </defs>
  <text x="100" y="30" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">念念印刷</text>
  <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" fill="#aaaacc" text-anchor="middle">shimauma print</text>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" fill="#8888bb" text-anchor="middle">手機沖印 APP</text>
</svg>
